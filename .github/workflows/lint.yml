# =============================================================================
#  WSL-AppBridge — PowerShell lint workflow
# =============================================================================
#  Runs PSScriptAnalyzer against every .ps1 and .psm1 in the repo to catch
#  syntax errors and common style issues before they hit main.
# =============================================================================

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  psanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error `
              -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions
          if ($results) {
              $results | Format-Table -AutoSize
              $errors = $results | Where-Object Severity -eq 'Error'
              if ($errors) {
                  Write-Host "::error::PSScriptAnalyzer reported $($errors.Count) error(s)."
                  exit 1
              }
              Write-Host "::warning::PSScriptAnalyzer reported $($results.Count) warning(s)."
          } else {
              Write-Host "Clean."
          }

  syntax:
    name: PowerShell syntax check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse every script
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -Include *.ps1,*.psm1
          $bad   = @()
          foreach ($f in $files) {
              $tokens = $null; $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $f.FullName, [ref]$tokens, [ref]$errors) | Out-Null
              if ($errors) {
                  $bad += [pscustomobject]@{ File = $f.FullName; Errors = $errors }
              }
          }
          if ($bad) {
              foreach ($b in $bad) {
                  Write-Host "::error file=$($b.File)::Parse errors:"
                  $b.Errors | ForEach-Object { Write-Host "  $($_.Message)" }
              }
              exit 1
          }
          Write-Host "All scripts parsed without errors."
